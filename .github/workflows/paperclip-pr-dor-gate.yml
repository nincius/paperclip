# Gate leve DoR (Fase C — TCN-1223). Ver docs/paperclip/GATE_DOR_PR_FASE_C.md

name: Paperclip DoR corpo PR

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]

concurrency:
  group: paperclip-dor-${{ github.repository }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate-pr-body-dor:
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Lê o payload completo do GitHub em disco (evita limites/escaping de `env` com
      # `toJSON(github.event.pull_request.body)` + `json.loads`, que pode falhar com corpos grandes ou nulos).
      - name: Materializar corpo e labels do PR
        run: |
          python3 <<'PY'
          import json
          import os

          with open(os.environ["GITHUB_EVENT_PATH"], encoding="utf-8") as fp:
              event = json.load(fp)
          pr = event.get("pull_request") or {}
          body = pr.get("body")
          if body is None or not isinstance(body, str):
              body = ""
          labels = pr.get("labels") or []
          with open("pr-body.md", "w", encoding="utf-8") as f:
              f.write(body)
          with open("pr-labels.json", "w", encoding="utf-8") as f:
              json.dump(labels, f, ensure_ascii=False)
          PY

      - name: Validar DoR
        run: node scripts/paperclip-pr-dor-validate.mjs --file pr-body.md --labels-file pr-labels.json
